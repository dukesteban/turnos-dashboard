<div class="servicios-page">

  <div *ngIf="mensaje" class="alerta exito">{{ mensaje }}</div>
  <div *ngIf="mensajeError" class="alerta error">{{ mensajeError }}</div>

  <div class="seccion">
    <div class="seccion-header">
      <h3>Servicios</h3>
      <button class="btn-secondary" (click)="mostrarForm = !mostrarForm">
        {{ mostrarForm ? 'Cancelar' : '+ Agregar servicio' }}
      </button>
    </div>

    <!-- Formulario nuevo servicio -->
    <div *ngIf="mostrarForm" class="form-nuevo">
      <div class="fila">
        <div class="campo">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="nuevoServicio.nombre" placeholder="Ej: Lavado premium" />
        </div>
        <div class="campo">
          <label>Precio ($)</label>
          <input type="number" [(ngModel)]="nuevoServicio.precio" placeholder="15000" />
        </div>
        <div class="campo">
          <label>Duración (min)</label>
          <input type="number" [(ngModel)]="nuevoServicio.duracion_minutos" placeholder="60" />
        </div>
        <button class="btn-primary" (click)="agregarServicio()">Agregar</button>
      </div>
    </div>

    <!-- Lista servicios -->
    <div class="tabla-wrapper">
      <table class="tabla-servicios">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Duración</th>
            <th>Activo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let servicio of servicios" [class.inactivo]="!servicio.activo">
            <td>
              <input type="text" [(ngModel)]="servicio.nombre" class="input-inline input-nombre" [readonly]="!servicio.editando" />
            </td>
            <td>
              <div class="input-con-prefix">
                <span class="prefix">$</span>
                <input type="number" [(ngModel)]="servicio.precio" class="input-inline input-numero" [readonly]="!servicio.editando" />
              </div>
            </td>
            <td>
              <div class="input-con-suffix">
                <input type="number" [(ngModel)]="servicio.duracion_minutos" class="input-inline input-numero" [readonly]="!servicio.editando" />
                <span class="unidad">min</span>
              </div>
            </td>
            <td>
              <label class="toggle">
                <input type="checkbox" [checked]="servicio.activo" (change)="toggleServicio(servicio)" />
                <span class="slider"></span>
              </label>
            </td>
            <td class="acciones">
              <button *ngIf="!servicio.editando" class="btn-icon" (click)="servicio.editando = true" title="Editar">✏️</button>
              <button *ngIf="servicio.editando" class="btn-icon" (click)="guardarServicio(servicio)" title="Guardar">💾</button>
              <button *ngIf="servicio.editando" class="btn-icon" (click)="servicio.editando = false" title="Cancelar">↩️</button>
              <button class="btn-icon" (click)="eliminarServicio(servicio.id)" title="Eliminar">🗑️</button>
            </td>
          </tr>
          <tr *ngIf="servicios.length === 0">
            <td colspan="5" class="vacio">No hay servicios configurados</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>
