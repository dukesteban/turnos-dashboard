<div class="config-page">
  <!--
  <div class="config-header">
    <h2>⚙️ Configuración del negocio</h2>
  </div>
  -->

  <!-- Mensaje feedback -->
  <div *ngIf="mensaje" class="alerta exito">{{ mensaje }}</div>
  <div *ngIf="mensajeError" class="alerta error">{{ mensajeError }}</div>

  <!-- Datos del negocio -->
  <div class="seccion">
    <div class="seccion-header">
      <h3>Datos del negocio</h3>
    </div>
    <div class="campo">
      <label>Nombre del negocio</label>
      <input type="text" [(ngModel)]="nombreNegocio" [readonly]="!editandoDatos" placeholder="Ej: Lavadero El Brillo" />
    </div>
    <div class="campo">
      <label>Descripción</label>
      <input type="text" [(ngModel)]="descripcion" [readonly]="!editandoDatos" placeholder="Ej: Lavadero de autos premium" />
    </div>
    <div class="campo">
      <label>Puestos por turno</label>
      <input type="number" min="1" max="10" [(ngModel)]="puestosXTurno" [readonly]="!editandoDatos" />
    </div>
    <div class="botones-edicion">
      <button *ngIf="!editandoDatos" class="btn-secondary" (click)="editandoDatos = true">✏️ Editar</button>
      <button *ngIf="editandoDatos" class="btn-primary" (click)="guardarConfiguracion()" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : '💾 Guardar' }}
      </button>
      <button *ngIf="editandoDatos" class="btn-secondary" (click)="cancelarConfiguracion()">↩️ Cancelar</button>
    </div>
  </div>

  <!-- Horarios de atención -->
  <div class="seccion">
    <div class="seccion-header">
      <h3>Horarios de atención</h3>
      <button class="btn-primary" (click)="mostrarFormHorario = !mostrarFormHorario">
        {{ mostrarFormHorario ? '↩️ Cancelar' : '➕ Nuevo' }}
      </button>
    </div>

    <!-- Formulario nuevo horario -->
    <div *ngIf="mostrarFormHorario" class="form-nuevo-horario">
      <div class="fila">
        <div class="campo">
          <label>Día</label>
          <select [(ngModel)]="nuevoHorario.dia_semana">
            <option *ngFor="let dia of diasSemana; let i = index" [value]="i">{{ dia }}</option>
          </select>
        </div>
        <div class="campo">
          <label>Desde</label>
          <input type="time" [(ngModel)]="nuevoHorario.hora_inicio" />
        </div>
        <div class="campo">
          <label>Hasta</label>
          <input type="time" [(ngModel)]="nuevoHorario.hora_fin" />
        </div>
        <button class="btn-primary" (click)="agregarHorario()">➕ Agregar</button>
      </div>
    </div>

    <!-- Lista horarios -->
    <div class="tabla-wrapper">
      <table class="tabla-horarios">
        <thead>
          <tr>
            <th>Día</th>
            <th>Desde</th>
            <th>Hasta</th>
            <th>Activo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let horario of horarios" [class.inactivo]="!horario.activo">
            <td>{{ getNombreDiaConTurno(horario) }}</td>
            <td>
              <input type="time" [(ngModel)]="horario.hora_inicio" class="input-hora" [readonly]="!horario.editando" />
            </td>
            <td>
              <input type="time" [(ngModel)]="horario.hora_fin" class="input-hora" [readonly]="!horario.editando" />
            </td>
            <td>
              <label class="toggle">
                <input type="checkbox" [checked]="horario.activo" (change)="toggleHorario(horario)" />
                <span class="slider"></span>
              </label>
            </td>
            <td class="acciones">
              <button *ngIf="!horario.editando" class="btn-save" (click)="horario.editando = true" title="Editar">✏️</button>
              <button *ngIf="horario.editando" class="btn-save" (click)="guardarHorario(horario)" title="Guardar">💾</button>
              <button *ngIf="horario.editando" class="btn-save" (click)="horario.editando = false" title="Cancelar">↩️</button>
              <button class="btn-delete" (click)="eliminarHorario(horario.id)" title="Eliminar">🗑️</button>
            </td>
          </tr>
          <tr *ngIf="horarios.length === 0">
            <td colspan="5" class="vacio">No hay horarios configurados</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
